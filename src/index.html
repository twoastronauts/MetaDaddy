<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MetaDADDY</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">M</div>
          <div>
            <h1>MetaDADDY</h1>
            <p id="appInfo">Desktop metadata bench</p>
          </div>
        </div>
        <div class="topbar-actions">
          <button id="revealButton" class="icon-button" title="Reveal selected file" disabled aria-label="Reveal selected file">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 7.5A2.5 2.5 0 0 1 5.5 5H10l2 2h6.5A2.5 2.5 0 0 1 21 9.5v7A2.5 2.5 0 0 1 18.5 19h-13A2.5 2.5 0 0 1 3 16.5v-9Z"/><path d="M12 11v5"/><path d="m9.5 13.5 2.5 2.5 2.5-2.5"/></svg>
          </button>
          <button id="exportButton" class="icon-button" title="Export metadata JSON" disabled aria-label="Export metadata JSON">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>
          </button>
          <button id="selectButton" class="primary-button">Select File</button>
        </div>
      </header>

      <section id="dropZone" class="drop-zone">
        <div class="drop-copy">
          <h2>Select or drop a media file</h2>
          <p>Originals stay read-only. Embedded writes are saved as new copies.</p>
        </div>
      </section>

      <section id="workspace" class="workspace hidden">
        <aside class="left-rail">
          <div class="preview-pane">
            <div id="previewStage" class="preview-stage">
              <div class="preview-empty">No preview</div>
            </div>
          </div>
          <div id="overviewPanel" class="overview-panel"></div>
        </aside>

        <section class="metadata-pane">
          <div class="tabs" role="tablist">
            <button class="tab active" data-tab="overview" role="tab">Overview</button>
            <button class="tab" data-tab="exif" role="tab">ExifTool</button>
            <button class="tab" data-tab="ffprobe" role="tab">Streams</button>
            <button class="tab" data-tab="write" role="tab">Write</button>
          </div>

          <div class="toolbar">
            <input id="searchInput" class="search-input" type="search" placeholder="Filter metadata" />
            <div id="metadataCount" class="metadata-count">0 fields</div>
          </div>

          <div id="tabOverview" class="tab-panel active"></div>
          <div id="tabExif" class="tab-panel"></div>
          <div id="tabFfprobe" class="tab-panel"></div>
          <div id="tabWrite" class="tab-panel">
            <div class="write-header">
              <div>
                <h2>Writable metadata</h2>
                <p>Original file stays untouched.</p>
              </div>
              <div class="write-actions">
                <button id="sidecarJsonButton" class="secondary-button" disabled>JSON Sidecar</button>
                <button id="sidecarXmpButton" class="secondary-button" disabled>XMP Sidecar</button>
                <button id="writeCopyButton" class="primary-button" disabled>Embedded Copy</button>
              </div>
            </div>
            <form id="writeForm" class="write-form"></form>
          </div>
        </section>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="./renderer.js"></script>
  </body>
</html>
